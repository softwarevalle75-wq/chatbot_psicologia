services:
  mysql:
    image: mysql:8.4
    container_name: chatbot_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DB_NAME:-chatbot_psico}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-p${MYSQL_DB_PASSWORD:-123456}']
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Vite inlines env vars at build time — these are baked into the JS bundle
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/v1/auth}
        VITE_CORE_API_BASE_URL: ${VITE_CORE_API_BASE_URL:-/v1}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    container_name: chatbot_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      SERVE_FRONTEND: 'true'
      DATABASE_URL: mysql://root:${MYSQL_DB_PASSWORD:-123456}@mysql:3306/${MYSQL_DB_NAME:-chatbot_psico}
      MYSQL_DB_HOST: mysql
      MYSQL_DB_PORT: 3306
      MYSQL_DB_USER: root
      MYSQL_DB_PASSWORD: ${MYSQL_DB_PASSWORD:-123456}
      MYSQL_DB_NAME: ${MYSQL_DB_NAME:-chatbot_psico}

      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag-psicologia}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      PDF_TARGET: ${PDF_TARGET:-practitioner}

      IP_DOMAIN: ${IP_DOMAIN:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      BOT_NUM: ${BOT_NUM:-}
      PRIMER_ADMIN: ${PRIMER_ADMIN:-}
    ports:
      - '3000:3000'
    volumes:
      - app_temp:/app/temp

volumes:
  mysql_data:
  app_temp:
