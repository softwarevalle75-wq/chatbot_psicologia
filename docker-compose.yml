version: '3.8'

services:
  chatbot-psico:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL para Docker (host.docker.internal)
      - DATABASE_URL=mysql://root:123456@host.docker.internal:3306/chatbot_psico
    restart: unless-stopped
    volumes:
      # Montar carpetas de sesión y tokens para persistencia
      - ./_sessions:/app/_sessions
      - ./tokens:/app/tokens
      - ./.wwebjs_auth:/app/.wwebjs_auth
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge