<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ChatBot Psicológico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .progress-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 40px;
            gap: 12px;
        }

        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .progress-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
            background: #ccc;
            transition: all 0.3s ease;
        }

        .progress-circle.active {
            background: #667eea;
            box-shadow: 0 2px 10px rgba(2, 29, 112, 0.3)
        }

        .progress-circle.completed {
            background: #28a745;
        }

        .progress-line {
            width: 60px;
            height: 2px;
            background: #ccc;
            transition: all 0.3s ease;
        }

        .progress-line.completed {
            background: #28a745;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 20px;
        }

        .form-group.full-width {
            flex: 1 1 100%;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group label.required::after {
            content: " *";
            color: #e74c3c;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group.precargado {
            background-color: #e8f5e8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-group.precargado label {
            color: #155724;
            font-weight: 600;
        }

        .form-group input[readonly],
        .form-group select[readonly] {
            background-color: #f8f9fa;
            border: 2px solid #28a745;
            color: #155724;
            cursor: not-allowed;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .btn {
            width: 40%;
            display: block;
            margin: 0 auto;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-bottom: 20px;            
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-text {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .info-text p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .info-text.highlight {
            background: #e8f5e8;
            border-left-color: #28a745;
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <center>
                <h1 id="formTitle">🤖 ChatBot Psicológico</h1>
            </center>
            <br>

            <div class="progress-container">
                <div class="progress-step">
                    <div class="progress-circle active" data-step="1">1</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step">
                    <div class="progress-circle" data-step="2">2</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step">
                    <div class="progress-circle" data-step="3">3</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step">
                    <div class="progress-circle" data-step="4">4</div>
                </div>
            </div>
        </div>

        <div class="info-text" id="infoText">
            <p>Complete todos los campos marcados con (*) para crear su cuenta. Esta información nos ayudará a brindarle un mejor servicio personalizado.</p>
        </div>        

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Registrando usuario...</p>
        </div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="primerNombre" class="required">Primer Nombre</label>
                    <input type="text" id="primerNombre" name="primerNombre" required>
                </div>
                <div class="form-group">
                    <label for="segundoNombre">Segundo Nombre</label>
                    <input type="text" id="segundoNombre" name="segundoNombre">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="primerApellido" class="required">Primer Apellido</label>
                    <input type="text" id="primerApellido" name="primerApellido" required>
                </div>
                <div class="form-group">
                    <label for="segundoApellido">Segundo Apellido</label>
                    <input type="text" id="segundoApellido" name="segundoApellido">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tipoDocumento" class="required">Tipo de Documento</label>
                    <select id="tipoDocumento" name="tipoDocumento" required>
                        <option value="" disabled selected>Seleccione...</option>
                        <option value="CC">Cédula de Ciudadanía</option>
                        <option value="CE">Cédula de Extranjería</option>
                        <option value="TI">Tarjeta de Identidad</option>
                        <option value="PA">Pasaporte</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="documento" class="required">Número de Documento</label>
                    <input type="text" id="documento" name="documento" required placeholder="Ej: 1234567890">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="correo" class="required">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" required>
                </div>
                <div class="form-group">
                    <label for="segundoCorreo">Segundo Correo (Opcional)</label>
                    <input type="email" id="segundoCorreo" name="segundoCorreo">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="telefonoPersonal" class="required">Teléfono Principal</label>
                    <input type="tel" id="telefonoPersonal" name="telefonoPersonal" required placeholder="Ej: 3001234567">
                </div>
                <div class="form-group">
                    <label for="segundoTelefono">Segundo Teléfono (Opcional)</label>
                    <input type="tel" id="segundoTelefono" name="segundoTelefono" placeholder="Ej: 3001234567">
                </div>
            </div>

            <div class="form-group">
                <label for="fechaNacimiento">Fecha de Nacimiento</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento">
            </div>

            <div class="form-group">
                <label for="genero" class="required">Género</label>
                <select id="genero" name="genero" required>
                    <option value="" disabled selected>Seleccione...</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Otro">Otro</option>
                    <option value="Prefiero no decir">Prefiero no decir</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="perteneceUniversidad" name="perteneceUniversidad">
                <label for="perteneceUniversidad">Pertenezco a la Universidad Universitaria de Colombia</label>
            </div>

            <div class="form-group">
                <label for="password" class="required">Contraseña</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="required">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
            </div>

            <button type="submit" class="btn" id="registerBtn">Registrarse</button>
        </form>

        <div class="login-link">
            <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script src="register-unified.js"></script>
</body>
</html>
